<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>小翼龙 项目文档</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">
  <style>
    .app-name, .navbar-brand, .sidebar, .sidebar-toggle { display: none !important; }
    main { margin-left: 0 !important; }

    .markdown-section {
      color: #111 !important;
      padding: 16px 18px !important;
      max-width: 900px !important;
      line-height: 1.7;
    }

    .markdown-section h1 { font-size: 1.6rem; word-break: break-word; }
    .markdown-section h2 { font-size: 1.3rem; margin-top: 1.2em; }
    .markdown-section h3 { font-size: 1.1rem; }
    .markdown-section h1, .markdown-section h2, .markdown-section h3,
    .markdown-section h4, .markdown-section h5, .markdown-section h6 {
      color: #111 !important;
      border-bottom: none !important;
    }

    .markdown-section a {
      color: #0052FF !important;
      text-decoration: underline !important;
      word-break: break-all;
    }

    .markdown-section table {
      display: block;
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      font-size: 14px;
    }

    .markdown-section pre {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      font-size: 13px;
    }

    @media (max-width: 768px) {
      .markdown-section { padding: 12px 14px !important; }
      .markdown-section h1 { font-size: 1.35rem !important; }
      .markdown-section h2 { font-size: 1.15rem !important; }
      .markdown-section table { font-size: 12px; }
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: '小翼龙 项目文档',
      homepage: 'README.md',
      hideSidebar: true,
      basePath: '/twd-docs-/',
      relativePath: false,
      loadSidebar: false,
      subMaxLevel: 3,
      notFoundPage: true,
      externalLinkTarget: '_blank',
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
</body>
</html>
