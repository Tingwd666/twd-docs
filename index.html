<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Tiny Winged Dragon</title>

  <!-- 统一 TWD 金属 Logo；勿用旧 XYL 版 favicon -->
  <link rel="icon" href="https://tingwd666.github.io/twd-docs/icon-512.png" type="image/png" sizes="512x512">
  <link rel="icon" href="https://tingwd666.github.io/twd-docs/favicon.ico" sizes="32x32">
  <link rel="icon" type="image/png" href="https://tingwd666.github.io/twd-docs/icon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="https://tingwd666.github.io/twd-docs/apple-touch-icon.png" sizes="180x180">
  <link rel="manifest" href="https://tingwd666.github.io/twd-docs/manifest.json">
  <meta name="theme-color" content="#050a18">
  <meta name="apple-mobile-web-app-title" content="TWD">
  <meta property="og:title" content="Tiny Winged Dragon">
  <meta property="og:image" content="https://tingwd666.github.io/twd-docs/icon-512.png">
  <meta property="og:type" content="website">

  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">
  <style>
    .app-name, .navbar-brand, .sidebar, .sidebar-toggle { display: none !important; }
    main { margin-left: 0 !important; }

    html, body {
      background: linear-gradient(145deg, #050a18 0%, #0a1d3b 45%, #0f3460 100%) !important;
      background-attachment: fixed !important;
      min-height: 100vh;
    }

    .content, #app, main, .markdown-section { background: transparent !important; }

    /* 全站文字强制白色（覆盖 docsify/vue 标题锚点蓝/绿链） */
    .markdown-section,
    .markdown-section *:not(pre):not(code) {
      color: #ffffff !important;
    }

    section.content .markdown-section h1 a,
    section.content .markdown-section h2 a,
    section.content .markdown-section h3 a,
    section.content .markdown-section h4 a,
    section.content .markdown-section h5 a,
    section.content .markdown-section h6 a,
    .markdown-section h1 a,
    .markdown-section h2 a,
    .markdown-section h3 a,
    .markdown-section h4 a,
    .markdown-section h5 a,
    .markdown-section h6 a,
    .markdown-section a,
    .markdown-section a:visited,
    .markdown-section a:hover,
    .markdown-section a:active,
    .markdown-section a:focus {
      color: #ffffff !important;
      text-decoration: underline !important;
      word-break: break-all;
    }

    .markdown-section {
      padding: 16px 18px !important;
      max-width: 900px !important;
      line-height: 1.7;
    }

    .markdown-section h1 {
      font-size: 1.5rem;
      font-weight: 700;
      word-break: break-word;
    }

    .markdown-section h2 {
      font-size: 1.85rem;
      font-weight: 700;
      margin-top: 1.4em;
      margin-bottom: 0.6em;
    }

    .markdown-section h3 { font-size: 1.1rem; }
    .markdown-section h1, .markdown-section h2, .markdown-section h3,
    .markdown-section h4, .markdown-section h5, .markdown-section h6 {
      border-bottom: none !important;
    }

    .markdown-section blockquote {
      border-left: 4px solid rgba(255, 255, 255, 0.35) !important;
      background: rgba(255, 255, 255, 0.06) !important;
    }

    .markdown-section code,
    .markdown-section pre code {
      background: rgba(0, 0, 0, 0.35) !important;
      color: #ffffff !important;
    }

    .markdown-section pre {
      background: rgba(0, 0, 0, 0.35) !important;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      font-size: 13px;
    }

    .markdown-section table {
      display: block;
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.04);
    }

    .markdown-section hr { border-color: rgba(255, 255, 255, 0.15) !important; }

    @media (max-width: 768px) {
      .markdown-section { padding: 12px 14px !important; }
      .markdown-section h1 { font-size: 1.35rem !important; }
      .markdown-section h2 { font-size: 1.65rem !important; }
      .markdown-section table { font-size: 12px; }
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: 'Tiny Winged Dragon',
      homepage: 'README.md',
      hideSidebar: true,
      basePath: '/twd-docs/',
      relativePath: true,
      loadSidebar: false,
      subMaxLevel: 3,
      notFoundPage: true,
      externalLinkTarget: '_blank',
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
</body>
</html>
